<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS – Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--pink:    #FF40A0;--magenta: #8040F0;--deep:    #5010C0;--light:   #f0e8ff;--text:    #0a0020;--muted:   #A060D0;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{
          font-family:'DM Sans',sans-serif;
          background:linear-gradient(135deg,#f0e8ff 0%,#e8e0ff 100%);
          min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .card{
          background:#fff;border-radius:24px;width:100%;max-width:440px;
          box-shadow:0 24px 60px rgba(128,64,240,.18);overflow:hidden;
          animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
        }
        .hero{
          background:linear-gradient(135deg,var(--pink) 0%,var(--magenta) 60%,var(--deep) 100%);
          padding:30px;text-align:center;color:#fff;
        }
        .hero h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:4px;}
        .hero p {font-size:13px;opacity:.85;}
        .body{padding:32px 30px;}
        .body h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:24px;text-align:center;}
        .form-group{margin-bottom:16px;}
        .form-group label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:7px;}
        .form-group input,.form-group select{
          width:100%;padding:12px 15px;border:2px solid #ddd0ff;border-radius:10px;
          font-size:14px;font-family:inherit;transition:.2s;background:#f0e8ff;color:var(--text);
        }
        .form-group input:focus,.form-group select:focus{
          outline:none;border-color:var(--magenta);background:#fff;box-shadow:0 0 0 3px rgba(128,64,240,.1);
        }
        .btn{
          width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;
          cursor:pointer;font-family:inherit;margin-top:4px;
          background:linear-gradient(135deg,var(--pink),var(--magenta));
          color:#fff;box-shadow:0 6px 20px rgba(128,64,240,.3);transition:.25s;
        }
        .btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(128,64,240,.4);}
        .message{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
        .message.show{display:block;}
        .message.success{background:#d4f8e8;color:#1a7a4a;border:1px solid #b2efd4;}
        .message.error  {background:#fde0e5;color:#9b1c2e;border:1px solid #f9bbc5;}
        .links{text-align:center;margin-top:20px;display:flex;flex-direction:column;gap:10px;}
        .links a{color:var(--magenta);font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;}
        .links a:hover{text-decoration:underline;}
        @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    </style>
</head>
<body>
<div class="card">
    <div class="hero"><h1>VBS</h1><p>Virtual Banking System</p></div>
    <div class="body">
        <h2>Create Account</h2>
        <div id="signupMessage" class="message"></div>
        <form id="signupForm">
            <div class="form-group"><label>Full Name</label><input type="text" id="signupName" required placeholder="Enter your name"></div>
            <div class="form-group"><label>Username</label><input type="text" id="signupUsername" required placeholder="Choose a username"></div>
            <div class="form-group"><label>Email</label><input type="email" id="signupEmail" required placeholder="Enter email"></div>
            <div class="form-group"><label>Password</label><input type="password" id="signupPassword" required placeholder="Create password"></div>
            <div class="form-group">
                <label>Role</label>
                <select id="signupRole" required>
                    <option value="">Select Role</option>
                    <option value="customer">Customer</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <div class="links">
            <a onclick="location.href='login.html'">Already have an account? Login</a>
            <a onclick="location.href='home.html'">Back to Home</a>
        </div>
    </div>
</div>
<script>
    const API='http://localhost:8081';
    const showMsg=(id,msg,type)=>{const el=document.getElementById(id);el.textContent=msg;el.className=`message ${type} show`;};
    document.getElementById('signupForm').addEventListener('submit',async e=>{
      e.preventDefault();
      const data={name:document.getElementById('signupName').value,username:document.getElementById('signupUsername').value,email:document.getElementById('signupEmail').value,password:document.getElementById('signupPassword').value,role:document.getElementById('signupRole').value,balance:0};
      try{
        const r=await(await fetch(`${API}/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})).text();
        if(r.toLowerCase().includes('success')){ showMsg('signupMessage','Account created! Redirecting to login...','success'); setTimeout(()=>location.href='login.html',1200); }
        else showMsg('signupMessage',r,'error');
      } catch{ showMsg('signupMessage','Error connecting to server.','error'); }
    });
</script>
</body>
</html>
