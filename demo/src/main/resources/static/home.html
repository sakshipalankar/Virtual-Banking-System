<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VBS – Virtual Banking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--pink:    #FF40A0;--magenta: #8040F0;--deep:    #5010C0;--light:   #f0e8ff;--text:    #0a0020;--muted:   #A060D0;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{
          font-family:'DM Sans',sans-serif;
          background:linear-gradient(135deg,#f0e8ff 0%,#e8e0ff 100%);
          min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .card{
          background:#fff;border-radius:24px;width:100%;max-width:440px;
          box-shadow:0 24px 60px rgba(128,64,240,.18);overflow:hidden;
          animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
        }
        .hero{
          background:linear-gradient(135deg,var(--pink) 0%,var(--magenta) 60%,var(--deep) 100%);
          padding:40px 30px;text-align:center;color:#fff;position:relative;overflow:hidden;
        }
        .hero::before{
          content:'';position:absolute;top:-50px;right:-50px;
          width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%;
        }
        .hero-logo{
          width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:18px;
          display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
          font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#fff;
        }
        .hero h1{font-family:'Playfair Display',serif;font-size:32px;margin-bottom:6px;}
        .hero p {font-size:13px;opacity:.85;letter-spacing:.5px;}
        .body{padding:36px 30px;}
        .tagline{text-align:center;margin-bottom:28px;}
        .tagline h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--text);margin-bottom:8px;}
        .tagline p {font-size:14px;color:var(--muted);line-height:1.6;}
        .features{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:30px;}
        .feat{
          background:var(--light);border-radius:14px;padding:18px;text-align:center;
          transition:.2s;border:2px solid transparent;
        }
        .feat:hover{background:#ede0ff;transform:translateY(-2px);border-color:var(--pink);}
        .feat-icon{
          width:36px;height:36px;margin:0 auto 10px;
          background:linear-gradient(135deg,var(--pink),var(--magenta));
          border-radius:10px;display:flex;align-items:center;justify-content:center;
        }
        .feat-icon svg{width:18px;height:18px;}
        .feat h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
        .feat p {font-size:11px;color:var(--muted);}
        .btn-group{display:flex;gap:12px;}
        .btn{
          flex:1;padding:14px;border:none;border-radius:12px;
          font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.25s;
        }
        .btn-primary{
          background:linear-gradient(135deg,var(--pink),var(--magenta));
          color:#fff;box-shadow:0 6px 20px rgba(128,64,240,.3);
        }
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(128,64,240,.4);}
        .btn-secondary{background:var(--light);color:var(--magenta);}
        .btn-secondary:hover{background:#ddd0ff;}
        @keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    </style>
</head>
<body>
<div class="card">
    <div class="hero">
        <div class="hero-logo">VB</div>
        <h1>VBS</h1>
        <p>Virtual Banking System</p>
    </div>
    <div class="body">
        <div class="tagline">
            <h2>Welcome to VBS</h2>
            <p>Secure, fast, and convenient banking at your fingertips.</p>
        </div>
        <div class="features">
            <div class="feat">
                <div class="feat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
                <h3>Secure</h3><p>Bank-grade security</p>
            </div>
            <div class="feat">
                <div class="feat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
                <h3>Instant</h3><p>Real-time transfers</p>
            </div>
            <div class="feat">
                <div class="feat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
                <h3>Mobile</h3><p>Works everywhere</p>
            </div>
            <div class="feat">
                <div class="feat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
                <h3>Insights</h3><p>Track your spending</p>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn btn-primary"   onclick="location.href='login.html'">Login</button>
            <button class="btn btn-secondary" onclick="location.href='signup.html'">Sign Up</button>
        </div>
    </div>
</div>
</body>
</html>
