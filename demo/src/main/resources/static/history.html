<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - Virtual Banking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink:    #FF40A0;
            --magenta: #8040F0;
            --deep:    #5010C0;
            --light:   #f0e8ff;
            --text:    #0a0020;
            --muted:   #A060D0;
            --radius:  16px;
            --shadow:  0 8px 32px rgba(128,64,240,.15);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #f0e8ff 0%, #e8e0ff 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1100px; margin: 0 auto;
            background: white; border-radius: var(--radius);
            overflow: hidden; box-shadow: 0 20px 60px rgba(128,64,240,.2);
        }

        /* HEADER */
        .header {
            background: linear-gradient(135deg, var(--pink) 0%, var(--magenta) 100%);
            padding: 22px 28px; color: white;
            display: flex; justify-content: space-between; align-items: center;
        }
        .brand { display:flex; align-items:center; gap:12px; }
        .brand-logo {
            width:44px; height:44px; background:rgba(255,255,255,.2);
            border-radius:12px; display:flex; align-items:center; justify-content:center;
            font-family:'Playfair Display',serif; font-size:16px; font-weight:700; color:#fff;
        }
        .brand h1 { font-family:'Playfair Display',serif; font-size:22px; }
        .brand p  { font-size:12px; opacity:.85; margin-top:2px; }

        .btn-header {
            padding:9px 18px; background:rgba(255,255,255,.18); color:white;
            border:1.5px solid rgba(255,255,255,.5); border-radius:10px;
            cursor:pointer; font-weight:600; font-size:13px;
            transition:.25s; font-family:inherit;
        }
        .btn-header:hover { background:white; color:var(--magenta); }

        /* CONTENT */
        .content { padding: 30px; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
        }
        .page-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px; color: var(--magenta);
        }
        .record-count {
            background: var(--light); padding: 5px 14px; border-radius: 20px;
            font-size: 13px; color: var(--magenta); font-weight: 600;
        }

        /* TABLE WRAPPER */
        .table-wrapper {
            background: var(--light); border-radius: 12px; padding: 20px; overflow-x: auto;
        }

        .history-table {
            width: 100%; border-collapse: collapse; background: white;
            border-radius: 10px; overflow: hidden;
        }

        .history-table thead {
            background: linear-gradient(135deg, var(--pink) 0%, var(--magenta) 100%);
            color: white;
        }
        .history-table th {
            padding: 15px 16px; text-align: left;
            font-weight: 600; font-size: 13px; letter-spacing: .4px;
        }

        .history-table tbody tr {
            border-bottom: 1px solid #f0e8ff; transition: .2s;
            animation: fadeUp .3s ease both;
        }
        .history-table tbody tr:last-child { border-bottom: none; }
        .history-table tbody tr:hover {
            background: var(--light);
        }

        .history-table td {
            padding: 14px 16px; font-size: 14px; color: var(--text);
        }

        .history-table td:first-child {
            font-weight: 700; color: var(--magenta); width: 70px;
        }

        .history-table td:nth-child(2) {
            color: #444; line-height: 1.5;
        }

        .date-cell {
            color: var(--muted); font-size: 12px; white-space: nowrap;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--muted);
        }
        .empty-state svg {
            width: 52px; height: 52px; margin-bottom: 16px; opacity: .4;
        }
        .empty-state p { font-size: 15px; }

        /* PAGINATION */
        .pagination {
            display: flex; justify-content: center; gap: 8px;
            margin-top: 20px; flex-wrap: wrap;
        }
        .pagination button {
            padding: 8px 14px; border: 1.5px solid #ddd0ff; background: white;
            border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
            font-family: inherit; color: var(--text); transition: .2s;
        }
        .pagination button:hover:not(.active) { border-color: var(--pink); color: var(--magenta); }
        .pagination button.active {
            background: linear-gradient(135deg, var(--pink), var(--magenta));
            color: white; border-color: transparent;
        }
        .pagination button:disabled { opacity: .4; cursor: not-allowed; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

        @media(max-width:600px){
            .header { flex-direction:column; gap:15px; text-align:center; }
            .content { padding:20px 15px; }
            .history-table th, .history-table td { padding:10px 12px; font-size:12px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="brand">
            <div class="brand-logo">VB</div>
            <div><h1>VBS</h1><p>Virtual Banking System</p></div>
        </div>
        <button class="btn-header" onclick="goBackToAdmin()">Back</button>
    </div>

    <div class="content">
        <div class="page-header">
            <h2>Admin History</h2>
            <span class="record-count" id="recordCount">0 records</span>
        </div>

        <div class="table-wrapper">
            <table class="history-table" id="historyTable">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Description</th>
                    <th>Date &amp; Time</th>
                </tr>
                </thead>
                <tbody id="historyBody">
                <tr>
                    <td colspan="3" style="text-align:center;padding:40px;color:var(--muted);">
                        Loading history...
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div id="paginationControls" class="pagination"></div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:8081';
    let userId = null;
    let allHistories = [];
    let currentPage = 1;
    const itemsPerPage = 10;

    function getUserIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        userId = params.get('id');
    }

    function goBackToAdmin() {
        window.location.href = `admin.html?id=${userId}&role=admin`;
    }

    async function loadHistories() {
        try {
            const res = await fetch(`${API_URL}/histories`);
            if (!res.ok) throw new Error('Failed');
            allHistories = await res.json();
            // Sort newest first
            allHistories.sort((a, b) => new Date(b.date) - new Date(a.date));
            document.getElementById('recordCount').textContent = allHistories.length + ' records';
            render();
        } catch (err) {
            document.getElementById('historyBody').innerHTML = `
                <tr><td colspan="3">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="3" width="16" height="18" rx="2"/>
                            <line x1="8" y1="8" x2="16" y2="8"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                            <line x1="8" y1="16" x2="12" y2="16"/>
                        </svg>
                        <p>Unable to load history. Ensure backend is running.</p>
                    </div>
                </td></tr>`;
        }
    }

    function render() {
        const body = document.getElementById('historyBody');
        const pag  = document.getElementById('paginationControls');

        if (!allHistories.length) {
            body.innerHTML = `
                <tr><td colspan="3">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="4" y="3" width="16" height="18" rx="2"/>
                            <line x1="8" y1="8" x2="16" y2="8"/>
                            <line x1="8" y1="12" x2="16" y2="12"/>
                            <line x1="8" y1="16" x2="12" y2="16"/>
                        </svg>
                        <p>No history records found.</p>
                    </div>
                </td></tr>`;
            pag.innerHTML = ''; return;
        }

        const totalPages = Math.ceil(allHistories.length / itemsPerPage);
        const slice = allHistories.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);

        body.innerHTML = slice.map((h, i) => `
            <tr style="animation-delay:${i * 0.04}s">
                <td>#${h.id}</td>
                <td>${escapeHtml(h.description)}</td>
                <td class="date-cell">${formatDate(h.date)}</td>
            </tr>`).join('');

        // Pagination
        pag.innerHTML = '';
        if (totalPages <= 1) return;

        pag.innerHTML += `<button onclick="go(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>`;
        for (let i = 1; i <= totalPages; i++) {
            if (i === currentPage) {
                pag.innerHTML += `<button class="active">${i}</button>`;
            } else if (i <= 2 || i >= totalPages - 1 || (i >= currentPage - 1 && i <= currentPage + 1)) {
                pag.innerHTML += `<button onclick="go(${i})">${i}</button>`;
            } else if (i === 3 || i === totalPages - 2) {
                pag.innerHTML += `<button disabled>...</button>`;
            }
        }
        pag.innerHTML += `<button onclick="go(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;
    }

    function go(p) { currentPage = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

    function formatDate(d) {
        if (!d) return '';
        const dt = new Date(d);
        if (isNaN(dt)) return d;
        return dt.toLocaleString('en-IN', {day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    window.addEventListener('DOMContentLoaded', () => {
        getUserIdFromURL();
        loadHistories();
    });
</script>
</body>
</html>
