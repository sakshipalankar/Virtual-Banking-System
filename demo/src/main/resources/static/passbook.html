<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VBS – Passbook</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --pink:    #FF40A0; --magenta: #8040F0; --deep:    #5010C0;
      --light:   #f0e8ff; --text:    #0a0020; --muted:   #A060D0;
      --green:#3ecf8e; --red:#f5576c; --blue:#4facfe;
      --radius:16px; --shadow:0 8px 32px rgba(128,64,240,.15);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

    body{
      font-family:'DM Sans',sans-serif;
      background:linear-gradient(135deg,#f0e8ff 0%,#e8e0ff 100%);
      min-height:100vh; padding:20px; color:var(--text);
    }

    .container{
      max-width:900px; margin:0 auto;
      background:#fff; border-radius:var(--radius);
      box-shadow:0 20px 60px rgba(128,64,240,.2); overflow:hidden;
    }

    /* HEADER */
    .header{
      background:linear-gradient(135deg,var(--pink) 0%,var(--magenta) 100%);
      padding:22px 28px; color:#fff;
      display:flex; justify-content:space-between; align-items:center;
    }
    .brand{ display:flex; align-items:center; gap:12px; }
    .brand-logo{
      width:42px; height:42px; background:rgba(255,255,255,.2);
      border-radius:12px; display:flex; align-items:center; justify-content:center;
      font-family:'Playfair Display',serif; font-size:15px; font-weight:700; color:#fff;
    }
    .brand h1{ font-family:'Playfair Display',serif; font-size:20px; }
    .brand p { font-size:12px; opacity:.85; margin-top:2px; }

    .header-actions{ display:flex; gap:10px; }
    .btn-ghost{
      padding:9px 18px; background:rgba(255,255,255,.18); color:#fff;
      border:1.5px solid rgba(255,255,255,.5); border-radius:10px;
      cursor:pointer; font-weight:600; font-size:13px;
      transition:.25s; font-family:inherit; text-decoration:none;
      display:inline-flex; align-items:center;
    }
    .btn-ghost:hover{ background:#fff; color:var(--magenta); }

    /* CONTENT */
    .content{ padding:30px; }

    /* BALANCE BAR */
    .balance-bar{
      background:linear-gradient(135deg,var(--magenta) 0%,var(--deep) 100%);
      border-radius:var(--radius); padding:24px 28px; color:#fff;
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:24px; position:relative; overflow:hidden;
      box-shadow:0 8px 28px rgba(128,64,240,.3);
    }
    .balance-bar::before{
      content:''; position:absolute; top:-40px; right:-40px;
      width:160px; height:160px; background:rgba(255,255,255,.06); border-radius:50%;
    }
    .balance-bar-left h2{
      font-family:'Playfair Display',serif; font-size:20px; margin-bottom:4px;
    }
    .balance-bar-left p{ font-size:12px; opacity:.75; }
    .balance-amount{
      font-family:'Playfair Display',serif; font-size:32px; font-weight:700;
      text-align:right;
    }
    .balance-amount span{ font-size:18px; opacity:.8; margin-right:3px; }

    /* FILTER ROW */
    .filter-row{
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:16px; flex-wrap:wrap; gap:12px;
    }
    .filter-row h3{
      font-family:'Playfair Display',serif; font-size:18px; color:var(--text);
    }
    .filter-tabs{ display:flex; gap:8px; }
    .tab{
      padding:7px 16px; border-radius:20px; border:1.5px solid #ddd0ff;
      background:#fff; color:var(--muted); font-size:12px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:.2s;
    }
    .tab.active{ background:var(--magenta); color:#fff; border-color:var(--magenta); }
    .tab:hover:not(.active){ background:var(--light); border-color:var(--pink); color:var(--magenta); }

    /* TRANSACTION LIST */
    .transactions-list{ display:flex; flex-direction:column; gap:10px; }

    .tx-item{
      background:#fff; border-radius:12px; padding:16px 18px;
      display:flex; justify-content:space-between; align-items:center;
      border-left:4px solid var(--pink);
      box-shadow:0 2px 10px rgba(128,64,240,.07);
      transition:transform .2s, box-shadow .2s;
      animation:fadeUp .3s ease both;
    }
    .tx-item:hover{ transform:translateX(4px); box-shadow:0 4px 18px rgba(128,64,240,.12); }
    .tx-item.deposit    { border-left-color:var(--green); }
    .tx-item.withdrawal { border-left-color:var(--red); }
    .tx-item.transfer   { border-left-color:var(--blue); }

    .tx-left{ display:flex; align-items:center; gap:14px; }
    .tx-icon{
      width:44px; height:44px; border-radius:12px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .tx-icon svg{ width:20px; height:20px; }
    .deposit    .tx-icon{ background:#d4f8e8; }
    .withdrawal .tx-icon{ background:#fde0e5; }
    .transfer   .tx-icon{ background:#d4e7ff; }

    .tx-desc{ font-size:14px; font-weight:600; color:var(--text); margin-bottom:3px; }
    .tx-date{ font-size:11px; color:var(--muted); }

    .tx-right{ text-align:right; }
    .tx-amount{ font-size:15px; font-weight:700; }
    .deposit    .tx-amount{ color:var(--green); }
    .withdrawal .tx-amount{ color:var(--red); }
    .transfer   .tx-amount{ color:var(--blue); }
    .tx-balance{ font-size:11px; color:var(--muted); margin-top:3px; }

    .empty-state{
      text-align:center; padding:50px 20px; color:var(--muted); font-size:14px;
    }
    .empty-state svg{ width:48px; height:48px; margin-bottom:14px; opacity:.4; }

    /* PAGINATION */
    .pagination{
      display:flex; justify-content:center; gap:8px; margin-top:20px; flex-wrap:wrap;
    }
    .pagination button{
      padding:8px 14px; border:1.5px solid #ddd0ff; background:#fff;
      border-radius:8px; cursor:pointer; font-size:13px; font-weight:500;
      font-family:inherit; color:var(--text); transition:.2s;
    }
    .pagination button:hover{ border-color:var(--pink); color:var(--magenta); }
    .pagination button.active{
      background:linear-gradient(135deg,var(--pink),var(--magenta));
      color:#fff; border-color:transparent;
    }
    .pagination button:disabled{ opacity:.4; cursor:not-allowed; }

    @keyframes fadeUp{ from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    @media(max-width:600px){
      .balance-bar{ flex-direction:column; align-items:flex-start; gap:12px; }
      .balance-amount{ text-align:left; font-size:26px; }
      .filter-row{ flex-direction:column; align-items:flex-start; }
      .content{ padding:20px 16px; }
      .header{ padding:16px 18px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="brand">
      <div class="brand-logo">VB</div>
      <div><h1>VBS</h1><p>Virtual Banking System</p></div>
    </div>
    <div class="header-actions">
      <a id="dashLink" class="btn-ghost">Dashboard</a>
      <button class="btn-ghost" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="content">

    <div class="balance-bar">
      <div class="balance-bar-left">
        <h2>Your Passbook</h2>
        <p>Complete transaction history</p>
      </div>
      <div class="balance-amount">
        <span>Rs.</span><span id="currentBalance">0.00</span>
      </div>
    </div>

    <div class="filter-row">
      <h3>Transactions</h3>
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all',this)">All</button>
        <button class="tab" onclick="setFilter('deposit',this)">Deposits</button>
        <button class="tab" onclick="setFilter('withdrawal',this)">Withdrawals</button>
        <button class="tab" onclick="setFilter('transfer',this)">Transfers</button>
      </div>
    </div>

    <div id="transactionsList" class="transactions-list"></div>
    <div id="paginationControls" class="pagination"></div>

  </div>
</div>

<script>
  const API_URL = 'http://localhost:8081';
  let userId, role;
  let transactions = [];
  let currentPage  = 1;
  let activeFilter = 'all';
  const itemsPerPage = 10;

  function getUserIdFromURL(){
    const p = new URLSearchParams(window.location.search);
    userId = p.get('id');
    role   = p.get('role') || 'customer';
    if(!userId) location.href = 'login.html';
    document.getElementById('dashLink').href = `dashboard.html?id=${userId}`;
  }

  async function loadPassbook(){
    try {
      const r = await fetch(`${API_URL}/passbook/${userId}`);
      transactions = await r.json();
      if(transactions.length){
        const sorted = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
        document.getElementById('currentBalance').textContent = sorted[0].currBalance.toFixed(2);
      }
      render();
    } catch {
      document.getElementById('transactionsList').innerHTML =
        '<p class="empty-state">Could not load transactions. Ensure backend is running.</p>';
    }
  }

  function getType(d){
    d = d.toLowerCase();
    if(d.includes('deposit'))    return 'deposit';
    if(d.includes('withdrawal')) return 'withdrawal';
    return 'transfer';
  }

  function setFilter(filter, el){
    activeFilter = filter;
    currentPage  = 1;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    render();
  }

  function render(){
    const list = document.getElementById('transactionsList');
    const pag  = document.getElementById('paginationControls');

    let sorted = [...transactions].sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(activeFilter !== 'all') sorted = sorted.filter(t => getType(t.description) === activeFilter);

    if(!sorted.length){
      list.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="3" width="16" height="18" rx="2"/>
            <line x1="8" y1="8" x2="16" y2="8"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
            <line x1="8" y1="16" x2="12" y2="16"/>
          </svg>
          <p>No transactions found.</p>
        </div>`;
      pag.innerHTML = '';
      return;
    }

    const totalPages = Math.ceil(sorted.length / itemsPerPage);
    const slice      = sorted.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage);

    list.innerHTML = slice.map((t, i) => {
      const type  = getType(t.description);
      const isIn  = type==='deposit' || (type==='transfer' && t.description.toLowerCase().includes('received'));
      const sign  = isIn ? '+' : '-';
      const date  = new Date(t.date).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});

      const strokeColor = type==='deposit' ? '#3ecf8e' : type==='withdrawal' ? '#f5576c' : '#4facfe';
      const icon = type==='deposit'
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>`
        : type==='withdrawal'
        ? `<svg viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>`
        : `<svg viewBox="0 0 24 24" fill="none" stroke="${strokeColor}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M15 6l6 6-6 6"/></svg>`;

      return `
        <div class="tx-item ${type}" style="animation-delay:${i*0.04}s">
          <div class="tx-left">
            <div class="tx-icon">${icon}</div>
            <div>
              <div class="tx-desc">${t.description}</div>
              <div class="tx-date">${date}</div>
            </div>
          </div>
          <div class="tx-right">
            <div class="tx-amount">${sign}Rs. ${t.amount.toFixed(2)}</div>
            <div class="tx-balance">Balance Rs. ${t.currBalance.toFixed(2)}</div>
          </div>
        </div>`;
    }).join('');

    // Pagination
    pag.innerHTML = '';
    if(totalPages <= 1) return;

    const addBtn = (label, page, disabled=false, active=false) => {
      pag.innerHTML += `<button onclick="go(${page})" ${disabled?'disabled':''} class="${active?'active':''}">${label}</button>`;
    };

    addBtn('Prev', currentPage-1, currentPage===1);
    for(let i=1; i<=totalPages; i++){
      if(i===1 || i===totalPages || (i>=currentPage-1 && i<=currentPage+1)){
        addBtn(i, i, false, i===currentPage);
      } else if(i===2 || i===totalPages-1){
        pag.innerHTML += `<button disabled>...</button>`;
      }
    }
    addBtn('Next', currentPage+1, currentPage===totalPages);
  }

  function go(p){ currentPage=p; render(); window.scrollTo({top:0,behavior:'smooth'}); }
  function logout(){ location.href='home.html'; }

  window.onload = () => { getUserIdFromURL(); loadPassbook(); };
</script>
</body>
</html>
